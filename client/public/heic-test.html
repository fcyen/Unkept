<!DOCTYPE html>
<html>
<head>
  <title>HEIC createImageBitmap Test</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 4px; white-space: pre-wrap; }
    .pass { color: green; } .fail { color: red; } .info { color: #666; }
    input { margin: 16px 0; }
  </style>
</head>
<body>
  <h2>HEIC createImageBitmap() Failure Test</h2>
  <p>Select a .heic file to test whether failure is catchable.</p>
  <input type="file" id="picker" accept="image/*,.heic,.heif">
  <pre id="log">Waiting for file selection...</pre>

  <script>
    const log = document.getElementById('log');
    function out(msg, cls = '') {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = msg + '\n';
      log.appendChild(span);
    }

    document.getElementById('picker').addEventListener('change', async (e) => {
      log.textContent = '';
      const file = e.target.files[0];
      if (!file) return;

      out(`File: ${file.name} (${(file.size / 1024).toFixed(1)} KB, type: "${file.type}")`, 'info');
      out('');

      // Test 1: Does createImageBitmap throw or reject?
      out('Test 1: createImageBitmap(file)');
      try {
        const bitmap = await createImageBitmap(file);
        out(`  PASS — decoded successfully: ${bitmap.width}×${bitmap.height}`, 'pass');
        out('  (This browser supports HEIC natively — likely Safari/WebKit)', 'info');
        bitmap.close();
      } catch (err) {
        out(`  CAUGHT — ${err.constructor.name}: ${err.message}`, 'pass');
        out('  Error IS catchable via try/catch on the promise.', 'pass');
      }

      // Test 2: Does it return a blank/zero-size bitmap instead of throwing?
      out('');
      out('Test 2: Check for silent blank bitmap');
      try {
        const bitmap = await createImageBitmap(file);
        if (bitmap.width === 0 || bitmap.height === 0) {
          out(`  DETECTED — bitmap is 0×0 (silent failure, no throw)`, 'fail');
          out('  Need to check dimensions as a fallback detection.', 'info');
        } else {
          out(`  Not blank — ${bitmap.width}×${bitmap.height}`, 'pass');
        }
        bitmap.close();
      } catch {
        out('  N/A — createImageBitmap threw (already caught above)', 'info');
      }

      // Test 3: Blob URL path (same as pipeline would use)
      out('');
      out('Test 3: via Blob URL');
      const url = URL.createObjectURL(file);
      try {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const bitmap = await createImageBitmap(blob);
        out(`  PASS — decoded from blob: ${bitmap.width}×${bitmap.height}`, 'pass');
        bitmap.close();
      } catch (err) {
        out(`  CAUGHT — ${err.constructor.name}: ${err.message}`, 'pass');
      }
      URL.revokeObjectURL(url);

      out('');
      out('=== Conclusion ===');
      out('If all failures show "CAUGHT", the assumption is validated:', 'info');
      out('createImageBitmap() rejection is catchable with try/catch.', 'info');
    });
  </script>
</body>
</html>
